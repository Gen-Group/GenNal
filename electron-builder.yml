appId: com.gennal.app
productName: GenNal
executableName: GenNal
copyright: Copyright © GenNal

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json

asarUnpack:
  - "**/node_modules/node-pty/**"

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: GenNal-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: GenNal

mac:
  icon: build/icon.png
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: GenNal-${version}-${arch}.${ext}
  # Unsigned build: lets the app run locally without an Apple Developer cert.
  # macOS will still show a Gatekeeper warning the first time (see notes below).
  identity: null

dmg:
  title: GenNal ${version}

linux:
  icon: build/icon.png
  category: Development
  synopsis: Multi-Model AI Cockpit
  description: Launch Codex, Claude & Gemini side by side in one workspace.
  maintainer: GenNal <loyeight@gmail.com>
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: snap
      arch:
        - x64
  # ext differentiates the three artifacts (.AppImage/.deb/.snap), so no arch suffix needed.
  artifactName: GenNal-${version}.${ext}

appImage:
  artifactName: GenNal-${version}.${ext}

# After building, copy dist/GenNal-Setup-1.0.0.exe to
# website/downloads/GenNal-Setup.exe to publish it on the site.
