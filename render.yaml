services:
  - type: web
    name: gen-nal
    runtime: static
    buildCommand: "echo 'static download site — no build step'"
    staticPublishPath: ./website
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /
        destination: /index.html
