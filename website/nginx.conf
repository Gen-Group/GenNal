server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Allow the ~83 MB installer to stream without buffering limits.
    sendfile           on;
    tcp_nopush         on;
    client_max_body_size 0;

    gzip            on;
    gzip_types      text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Clean URLs (mirrors the previous vercel.json behavior).
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Long-lived caching for fingerprinted/static assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Installer downloads: always served as a binary attachment.
    location /downloads/ {
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=86400";
    }
}
